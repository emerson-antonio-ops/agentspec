[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentspec-mcp"
version = "0.1.0"
description = "AgentSpec MCP server: KB search, agent routing, judge, SDD status."
authors = [
  { name = "Luan Moreno", email = "luan.moreno@owshq.com" },
  { name = "Emerson Antonio" }
]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.10"
keywords = ["mcp", "agentspec", "data-engineering", "sdd"]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Topic :: Software Development :: Code Generators",
]

[project.scripts]
agentspec-mcp = "agentspec_mcp.__main__:main"

[tool.setuptools]
packages = ["agentspec_mcp"]
